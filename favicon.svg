<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ryan Schmidt favicon">
  <rect width="64" height="64" rx="12" fill="#0F172A" />

  <!-- central white plate for contrast -->
  <circle cx="32" cy="32" r="18" fill="#F8FAFC" />

  <!-- diagonal muted stripe accent to match the site palette -->
